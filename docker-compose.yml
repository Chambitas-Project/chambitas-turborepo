version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: chambitas-api-gateway
    ports:
      - "3000:3000"
    env_file:
      - .env
      - apps/api-gateway/.env
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: chambitas-auth-service
    ports:
      - "3001:3001"
    env_file:
      - .env
      - apps/auth-service/.env
    restart: unless-stopped

  profile-service:
    build:
      context: .
      dockerfile: apps/profile-service/Dockerfile
    container_name: chambitas-profile-service
    ports:
      - "3002:3002"
    env_file:
      - .env
      - apps/profile-service/.env
    restart: unless-stopped

  matching-service:
    build:
      context: .
      dockerfile: apps/matching-service/Dockerfile
    container_name: chambitas-matching-service
    ports:
      - "3003:3003"
    env_file:
      - .env
      - apps/matching-service/.env
    restart: unless-stopped

  marketplace-service:
    build:
      context: .
      dockerfile: apps/marketplace-service/Dockerfile
    container_name: chambitas-marketplace-service
    ports:
      - "3004:3004"
    env_file:
      - .env
      - apps/marketplace-service/.env
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: chambitas-notification-service
    ports:
      - "3005:3005"
    env_file:
      - .env
      - apps/notification-service/.env
    restart: unless-stopped

  ml-engine:
    build:
      context: .
      dockerfile: apps/ml-engine/Dockerfile
    container_name: chambitas-ml-engine
    ports:
      - "8000:8000"
    env_file:
      - .env
      - apps/ml-engine/.env
    restart: unless-stopped
